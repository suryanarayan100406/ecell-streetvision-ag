version: "3.9"

services:
  # ── Core Database ─────────────────────────────────────────────
  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      retries: 5

  # ── Redis Cache / Broker ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      gunicorn app.main:app
      --workers 4
      --worker-class uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --timeout 120
    env_file: .env
    volumes:
      - ./backend:/app
      - satellite_data:/data/satellite
      - drone_data:/data/drone
      - cctv_data:/data/cctv
      - complaint_data:/data/complaints
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Workers ────────────────────────────────────────────
  celery_worker_satellite:
    build: ./backend
    command: celery -A app.celery_app worker -Q satellite_queue -c 2 -n satellite@%h --loglevel=info
    env_file: .env
    volumes:
      - ./backend:/app
      - satellite_data:/data/satellite
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 1

  celery_worker_inference:
    build: ./backend
    command: celery -A app.celery_app worker -Q inference_queue -c 4 -n inference@%h --loglevel=info
    env_file: .env
    volumes:
      - ./backend:/app
      - satellite_data:/data/satellite
      - drone_data:/data/drone
      - cctv_data:/data/cctv
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 1

  celery_worker_drone:
    build: ./backend
    command: celery -A app.celery_app worker -Q drone_queue -c 2 -n drone@%h --loglevel=info
    env_file: .env
    volumes:
      - ./backend:/app
      - drone_data:/data/drone
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker_filing:
    build: ./backend
    command: celery -A app.celery_app worker -Q filing_queue -c 2 -n filing@%h --loglevel=info
    env_file: .env
    volumes:
      - ./backend:/app
      - complaint_data:/data/complaints
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker_verification:
    build: ./backend
    command: celery -A app.celery_app worker -Q verification_queue -c 2 -n verification@%h --loglevel=info
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker_notification:
    build: ./backend
    command: celery -A app.celery_app worker -Q notification_queue -c 1 -n notification@%h --loglevel=info
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker_admin:
    build: ./backend
    command: celery -A app.celery_app worker -Q admin_queue -c 1 -n admin@%h --loglevel=info
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker_cctv:
    build: ./backend
    command: celery -A app.celery_app worker -Q cctv_queue -c 1 -n cctv@%h --loglevel=info
    env_file: .env
    volumes:
      - ./backend:/app
      - cctv_data:/data/cctv
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Beat Scheduler ────────────────────────────────────
  celery_beat:
    build: ./backend
    command: celery -A app.celery_app beat --loglevel=info
    env_file: .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Admin Frontend ───────────────────────────────────────────
  admin_frontend:
    build:
      context: ./admin-frontend
      dockerfile: Dockerfile
    ports:
      - "3001:80"

  # ── Public Frontend ──────────────────────────────────────────
  public_frontend:
    build:
      context: ./public-frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"

  # ── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - admin_frontend
      - public_frontend

  # ── MinIO Object Storage ─────────────────────────────────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  # ── NodeODM (Drone Processing) ──────────────────────────────
  odm_worker:
    image: opendronemap/nodeodm:latest
    ports:
      - "3002:3000"
    volumes:
      - drone_data:/var/www/data

  # ── MLflow Tracking ──────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.0
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow-artifacts
    volumes:
      - mlflowdata:/mlflow-artifacts
    ports:
      - "5000:5000"

  # ── Prometheus ───────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    ports:
      - "9090:9090"

  # ── Grafana ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafanadata:/var/lib/grafana
    ports:
      - "3003:3000"

  # ── Loki (Log Aggregation) ──────────────────────────────────
  loki:
    image: grafana/loki:2.9.5
    ports:
      - "3100:3100"
    volumes:
      - lokidata:/loki

  # ── Promtail (Log Shipping) ─────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.5
    volumes:
      - /var/log:/var/log:ro
      - ./monitoring/promtail.yml:/etc/promtail/config.yml:ro
    depends_on:
      - loki

volumes:
  pgdata:
  redisdata:
  miniodata:
  mlflowdata:
  prometheusdata:
  grafanadata:
  lokidata:
  satellite_data:
  drone_data:
  cctv_data:
  complaint_data:
