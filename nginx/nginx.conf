worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Rate limiting for admin auth
    limit_req_zone $binary_remote_addr zone=admin_auth:10m rate=5r/m;

    # API upstream
    upstream api_backend {
        server api:8000;
    }

    server {
        listen 80;
        server_name _;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;

        # Public frontend
        location / {
            proxy_pass http://public_frontend:80;
            proxy_set_header Host $host;
            proxy_cache_valid 200 5m;
        }

        # Admin frontend
        location /admin {
            proxy_pass http://admin_frontend:80;
            proxy_set_header Host $host;
        }

        # API endpoints
        location /api/ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # Admin auth rate limiting
        location /api/admin/auth/ {
            limit_req zone=admin_auth burst=3 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebSocket
        location /socket.io/ {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # Health check
        location /health {
            proxy_pass http://api_backend/health;
        }

        # Prometheus metrics
        location /metrics {
            proxy_pass http://api_backend/metrics;
        }

        # Grafana
        location /grafana/ {
            proxy_pass http://grafana:3000/;
            proxy_set_header Host $host;
        }
    }
}
